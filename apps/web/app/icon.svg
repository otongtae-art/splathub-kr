<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- SplatHub 로고: photogrammetry 의 다각도 촬영 비유 -->
  <!-- 검정 배경 (OLED) -->
  <rect width="32" height="32" rx="7" fill="#0e1011"/>
  <!-- 중앙 대상 객체 (Emerald, 가장 큼) -->
  <circle cx="16" cy="16" r="3.2" fill="#10b981"/>
  <!-- 카메라 3개 위치 (삼각형, photogrammetry 의 multi-view) -->
  <circle cx="16" cy="6.5" r="1.6" fill="#10b981" opacity="0.85"/>
  <circle cx="24.2" cy="20.5" r="1.6" fill="#10b981" opacity="0.65"/>
  <circle cx="7.8" cy="20.5" r="1.6" fill="#10b981" opacity="0.45"/>
  <!-- 궤도 (subtle dashed) -->
  <circle cx="16" cy="16" r="9.5" fill="none" stroke="#10b981" stroke-width="0.5" stroke-dasharray="1 1.5" opacity="0.3"/>
</svg>
